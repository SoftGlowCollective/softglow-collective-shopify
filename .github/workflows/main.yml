## 🚀 Installation / Setup (Shopify)

1. Install Shopify theme (Dawn or custom premium theme)
2. Upload branding assets from `/assets` folder
3. Configure collections:
   - Best Sellers
   - Skincare
   - Beauty Tools
   - Self-Care Essentials
4. Set homepage sections:
   - Hero Banner
   - Featured Products
   - Collections Grid
   - Customer Reviews
   - Email Signup
5. Connect Shopify Payments
6. Launch store 🚀

